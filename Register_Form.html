<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="miull_register_form">
        <h3>Register Form</h3>
        <div class="title">Hoşgeldiniz</div>
        <form action="#!" method="get" id="register_id" enctype="multipart/form-data">
            <table>
                <tbody>
                    <tr>
                        <td><span for="username">Username</span></td>
                        <div class="miull_container"></div>
                        <td><input class="miull_input" type="text" name="username" id="username" placeholder="Kullanıcı Adınız" autofocus required></td>
                        </div>
                    </tr>
                    <tr>
                        <td><span for="uname">Name</span></td>
                        <div class="miull_container"></div>
                        <td><input class="miull_input" type="text" name="uname" id="uname" placeholder="Adınız" required></td>
                        </div>
                    </tr>
                    <tr>
                        <td><span for="usurname">Surname</span></td>
                        <div class="miull_container"></div>
                        <td><input class="miull_input" type="text" name="usurname" id="usurname" placeholder="Soyadınız" required></td>
                        </div>
                    </tr>
                    <tr>
                        <td><span for="email">E-mail</span></td>
                        <div class="miull_container"></div>
                        <td><input class="miull_input" type="email" name="email" id="email" placeholder="E-mail Adresiniz" required></td>
                        </div>
                    </tr>
                    <tr>
                        <td><span for="upassword">Password</span></td>
                        <div class="miull_container"></div>
                        <td><input class="miull_input" type="password" name="upassword" id="upassword" placeholder="Şifreniz" required></td>
                        </div>     
                    </tr>
                    <tr>
                        <td></td>
                        <td>
                            <input class="miull_button" type="reset" name="reset" id="reset" value="Temizle">
                            <button type="submit" name="submit" id="submit" >Kayıt Ol</button>
                        </td>

                    </tr>
                </tbody>
            </table>
        </form>
    </div>
</body>
</html>

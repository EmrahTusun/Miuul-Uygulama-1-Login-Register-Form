<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="miull_login_form">
        <h3 class="header">Login Form</h3>
        <div class="title">Hoşgeldiniz</div>
        <div class="miull_container"></div>
        <form action="#!" method="get" id="login_id" name="login_form">
            <div class="form-group">
                <label for="uemail">E-mail</label>
                <input type="email" name="uemail" id="uemail" placeholder="E-mail Address" required autofocus/>
            </div>
            <br>
            <div class="form-group">
                <label for="upassword">Password</label>
                <input type="password" name="upassword" id="upassword" placeholder="Password" required/>
            </div>
        </form>
        <a href="https://miuul.com">Miuul</a>
    </div>
</body>
</html>

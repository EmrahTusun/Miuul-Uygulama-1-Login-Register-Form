<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Login.css">
</head>
<body>
    <div class="miuul_login_form">
        <a href="https://miuul.com"><div class="miuul_logo"></div></a>
        <div class="miuul_title">Miuul Login Form</div>

        <form action="#!" method="get" id="login_id" name="login_form">
            <div class="miuul_container">
                <label for="uemail">E-mail</label>
                <input type="email" name="uemail" id="uemail" placeholder="E-mail Address" required autofocus/>
                <label for="upassword">Password</label>
                <input type="password" name="upassword" id="upassword" placeholder="Password" required/>
                <button type="submit" class="btn">Login</button>
            </div>
        </form>
    </div>
</body>
</html>
